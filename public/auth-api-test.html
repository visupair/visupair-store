<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Better Auth API Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .test-box {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      border-left: 4px solid #8480FF;
    }
    input { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
    button {
      background: #8480FF;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      margin: 10px 0;
    }
    button:hover { opacity: 0.9; }
    .result {
      background: #f0f0f0;
      padding: 10px;
      border-radius: 4px;
      margin-top: 10px;
      font-family: monospace;
      font-size: 12px;
      overflow: auto;
      max-height: 250px;
    }
    .success { color: #22C55E; font-weight: bold; }
    .error { color: #FF6B6B; font-weight: bold; }
  </style>
</head>
<body>
  <h1>🔐 Better Auth API Test</h1>

  <div class="test-box">
    <h2>Endpoints Test</h2>
    <p>Check available Better Auth endpoints:</p>
    <button onclick="testSignUpEmail()">POST /sign-up</button>
    <button onclick="testSignInEmail()">POST /sign-in/email</button>
    <button onclick="testSession()">GET /session</button>
    <div id="endpoints-result" class="result"></div>
  </div>

  <div class="test-box">
    <h2>Sign Up</h2>
    <input type="email" id="email" placeholder="Email" value="testuser123@example.com">
    <input type="password" id="password" placeholder="Password" value="SecurePass123">
    <input type="text" id="name" placeholder="Name" value="Test User">
    <button onclick="signUp()">Create Account</button>
    <div id="signup-result" class="result"></div>
  </div>

  <div class="test-box">
    <h2>Sign In</h2>
    <input type="email" id="signin-email" placeholder="Email" value="testuser123@example.com">
    <input type="password" id="signin-password" placeholder="Password" value="SecurePass123">
    <button onclick="signIn()">Sign In</button>
    <div id="signin-result" class="result"></div>
  </div>

  <div class="test-box">
    <h2>Session Info</h2>
    <button onclick="getSession()">Get Session</button>
    <div id="session-result" class="result"></div>
  </div>

  <script>
    const API = 'http://localhost:4322/api/auth';

    async function log(id, response) {
      const result = await response.text();
      const parsed = result ? JSON.parse(result) : {};
      document.getElementById(id).innerHTML = `
        <strong class="${response.ok ? 'success' : 'error'}">
          ${response.ok ? '✓' : '✗'} ${response.status} ${response.statusText}
        </strong>
        <pre>${JSON.stringify(parsed, null, 2)}</pre>
      `;
    }

    async function testSignUpEmail() {
      const res = await fetch(`${API}/sign-up`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: 'test@example.com', password: 'pass123', name: 'Test' }),
        credentials: 'include'
      });
      await log('endpoints-result', res);
    }

    async function testSignInEmail() {
      const res = await fetch(`${API}/sign-in/email`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: 'test@example.com', password: 'pass123' }),
        credentials: 'include'
      });
      await log('endpoints-result', res);
    }

    async function testSession() {
      const res = await fetch(`${API}/session`, { credentials: 'include' });
      await log('endpoints-result', res);
    }

    async function signUp() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const name = document.getElementById('name').value;
      
      const res = await fetch(`${API}/sign-up`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, name }),
        credentials: 'include'
      });
      await log('signup-result', res);
    }

    async function signIn() {
      const email = document.getElementById('signin-email').value;
      const password = document.getElementById('signin-password').value;
      
      const res = await fetch(`${API}/sign-in/email`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
        credentials: 'include'
      });
      await log('signin-result', res);
    }

    async function getSession() {
      const res = await fetch(`${API}/session`, { credentials: 'include' });
      await log('session-result', res);
    }
  </script>
</body>
</html>
